<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<!-- Primary Meta Tags -->
<title>{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Khelnedo Games{% else %}{{ site.title }}{% endif %}</title>
<meta name="title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Khelnedo Games{% else %}{{ site.title }}{% endif %}">
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}sudoku, sudoku app, free sudoku, brain training, puzzle game, daily sudoku, sudoku spark, number puzzle{% endif %}">
<meta name="author" content="Khelnedo Games">
<meta name="publisher" content="Khelnedo Games">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
<meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
<meta name="bingbot" content="index, follow">
<link rel="canonical" href="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">

<!-- Language & Locale -->
<meta http-equiv="content-language" content="en">
<link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">
<link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">

<!-- Google Site Verification -->
<meta name="google-site-verification" content="googlec88f0ef08bc2affc">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="{% if page.og_type %}{{ page.og_type }}{% else %}website{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">
<meta property="og:title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:image" content="{{ site.url }}{% if page.image %}{{ page.image }}{% else %}/assets/images/sudoku-spark-og.png{% endif %}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Sudoku Spark — Free Brain Training Puzzle Game">
<meta property="og:site_name" content="Khelnedo Games">
<meta property="og:locale" content="en_US">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">
<meta name="twitter:title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="twitter:image" content="{{ site.url }}{% if page.image %}{{ page.image }}{% else %}/assets/images/sudoku-spark-og.png{% endif %}">

<!-- App Links (Google, Facebook, Smart Banners) -->
<meta property="al:android:package" content="com.worldclass.sudoku">
<meta property="al:android:url" content="https://play.google.com/store/apps/details?id=com.worldclass.sudoku">
<meta property="al:android:app_name" content="Sudoku Spark — Play & Learn">
<meta name="google-play-app" content="app-id=com.worldclass.sudoku">
<link rel="alternate" href="android-app://com.worldclass.sudoku/https/khelnedogames.com">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6C3CE1">
<meta name="msapplication-TileColor" content="#6C3CE1">

<!-- Preconnect for performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">

<!-- RSS/Atom Feed -->
<link rel="alternate" type="application/atom+xml" title="Khelnedo Games Feed" href="/feed.xml">

<!-- CSS -->
<link rel="stylesheet" href="/assets/css/style.css">

<!-- Schema.org: BreadcrumbList -->
<script type="application/ld+json">

  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://khelnedogames.com/"
    }{% if page.breadcrumb_2 %},
    {
      "@type": "ListItem",
      "position": 2,

      "@type": "ListItem",
